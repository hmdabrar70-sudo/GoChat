<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoChat - Secure Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; color: #333; }
        
        #admin-login-screen { display: flex; height: 100vh; justify-content: center; align-items: center; background: #2c3e50; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center; }
        .login-box h2 { margin-bottom: 10px; color: #4f46e5; }
        .login-box p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        
        .input-field { width: 100%; padding: 14px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; outline: none; font-size: 16px; transition: 0.3s; text-align: center; letter-spacing: 1px;}
        .input-field:focus { border-color: #f59e0b; background: #fffbeb; }
        
        .btn { width: 100%; padding: 14px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .btn:hover { background: #4338ca; }
        .btn-google { background: #fff; color: #333; border: 1px solid #ddd; }
        .btn-google:hover { background: #f9f9f9; }
        .btn-danger { background: #e74c3c; margin-top: 15px; background: transparent; color: #e74c3c; border: 1px solid #e74c3c;}
        
        #admin-dashboard { display: none; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: #2c3e50; color: white; padding: 20px 0; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; letter-spacing: 1px; }
        .nav-link { padding: 15px 20px; color: #bdc3c7; text-decoration: none; display: block; border-left: 4px solid transparent; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: #34495e; color: white; border-left-color: #4f46e5; }
        
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .stats-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; flex: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; border-bottom: 4px solid #4f46e5; }
        .stat-card h3 { color: #7f8c8d; font-size: 16px; margin-bottom: 10px; }
        .stat-card h1 { color: #2c3e50; font-size: 32px; }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .data-table th, .data-table td { border-bottom: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; }
        .data-table th { background: #4f46e5; color: white; }
        .data-table img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .action-btn { padding: 6px 12px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .action-btn:hover { background: #c0392b; }

        .admin-form-group { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .admin-form-group textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-top: 10px; outline: none; }
        .toggle-btn { padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        .toggle-on { background: #27ae60; }
        .toggle-off { background: #e74c3c; }

        @media (max-width: 768px) {
            #admin-dashboard { flex-direction: column; }
            .sidebar { width: 100%; padding: 10px; display: flex; flex-direction: row; flex-wrap: wrap; justify-content: space-around; }
            .sidebar h2 { display: none; }
            .nav-link { padding: 10px; font-size: 14px; border-left: none; border-bottom: 3px solid transparent; }
            .nav-link:hover, .nav-link.active { border-left: none; border-bottom-color: #4f46e5; }
            .main-content { padding: 15px; }
            .stats-grid { flex-direction: column; }
            .data-table { display: block; overflow-x: auto; white-space: nowrap; }
        }
    </style>
</head>
<body>

    <div id="admin-login-screen">
        
        <div class="login-box" id="google-login-box">
            <h2>GoChat Admin</h2>
            <p>Master Control Panel</p>
            <button class="btn btn-google" onclick="loginWithGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20">
                Continue with Google
            </button>
        </div>

        <div class="login-box" id="secret-key-box" style="display: none;">
            <h2>Security Check</h2>
            <p>Enter the master secret key to grant admin access to this account.</p>
            <div id="secret-error" style="color: red; margin-bottom: 10px; font-size: 14px; font-weight: bold;"></div>
            <input type="password" id="admin-secret-key" class="input-field" placeholder="Enter Secret Key 🔑">
            <button class="btn" style="background: #f59e0b;" onclick="verifySecretKey()">Verify & Enter</button>
            <button class="btn btn-danger" onclick="logoutAdmin()">Cancel & Logout</button>
        </div>

    </div>

    <div id="admin-dashboard">
        <div class="sidebar">
            <h2>Admin Panel</h2>
            <div class="nav-link active" onclick="switchTab('dashboard')">📊 Dashboard</div>
            <div class="nav-link" onclick="switchTab('profile')">👤 My Profile</div>
            <div class="nav-link" onclick="switchTab('users')">👥 Users List</div>
            <div class="nav-link" onclick="switchTab('posts')">📝 Manage Posts</div>
            <div class="nav-link" onclick="switchTab('announce')">📢 Announcements</div>
            <div class="nav-link" onclick="switchTab('settings')">🛠️ Settings</div>
            <div style="flex:1;"></div>
            <div class="nav-link" style="color: #e74c3c;" onclick="logoutAdmin()">🚪 Logout</div>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1 id="page-title">Dashboard</h1>
                <div>Welcome, <strong style="color: #4f46e5;" id="header-admin-name">Admin</strong></div>
            </div>
            <div id="content-area"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config
        firebase.initializeApp({
            apiKey: "AIzaSyAnKueAHG8cw6O-Hy8U9fgGzH4fDMYQBy8",
            authDomain: "gochat-3efa3.firebaseapp.com",
            projectId: "gochat-3efa3",
            storageBucket: "gochat-3efa3.firebasestorage.app",
            messagingSenderId: "203332487017",
            appId: "1:203332487017:web:06af0b8b4b12af89581ff8"
        });

        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // 🔒 THE ONLY WAY IN
        const SECRET_KEY = "sabbir@hm@d";

        // --- Auth State Listener ---
        auth.onAuthStateChanged(async user => {
            if (user) {
                // ইউজার গুগলে লগইন করেছে, এখন চেক করবো সে অ্যাডমিন ফোল্ডারে আছে কি না
                document.getElementById('google-login-box').style.display = 'none';
                
                try {
                    const adminDoc = await db.collection('admin_users').doc(user.uid).get();
                    if (adminDoc.exists) {
                        // ভেরিফাইড অ্যাডমিন, সরাসরি প্যানেলে ঢুকবে
                        showDashboard(user);
                    } else {
                        // নতুন অ্যাকাউন্ট, সিক্রেট কি চাইবে
                        document.getElementById('secret-key-box').style.display = 'block';
                    }
                } catch(e) {
                    console.error("Error checking admin status:", e);
                }
            } else {
                hideDashboard();
                document.getElementById('google-login-box').style.display = 'block';
                document.getElementById('secret-key-box').style.display = 'none';
            }
        });

        // --- Google Login Flow ---
        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
            } catch(e) {
                alert("Google Sign-in failed. Please try again.");
            }
        }

        // --- Secret Key Verification ---
        async function verifySecretKey() {
            const inputKey = document.getElementById('admin-secret-key').value.trim();
            const err = document.getElementById('secret-error');
            
            if(inputKey === SECRET_KEY) {
                err.style.color = "green";
                err.innerText = "Access Granted! Setting up your admin account...";
                
                // সঠিক কোড দিলে তাকে 'admin_users' ফোল্ডারে সেভ করে নেবে
                const user = auth.currentUser;
                await db.collection('admin_users').doc(user.uid).set({
                    email: user.email,
                    name: user.displayName || 'Admin',
                    role: 'master_admin',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // ড্যাশবোর্ড দেখাবে
                document.getElementById('secret-key-box').style.display = 'none';
                showDashboard(user);
            } else {
                err.style.color = "red";
                err.innerText = "Incorrect Secret Key! Access Denied.";
                document.getElementById('admin-secret-key').value = '';
            }
        }

        function showDashboard(user) {
            document.getElementById('admin-login-screen').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'flex';
            const displayName = user.displayName ? user.displayName.split(' ')[0] : user.email.split('@')[0];
            document.getElementById('header-admin-name').innerText = displayName;
            switchTab('dashboard');
        }

        function hideDashboard() {
            document.getElementById('admin-login-screen').style.display = 'flex';
            document.getElementById('admin-dashboard').style.display = 'none';
        }

        async function logoutAdmin() { 
            await auth.signOut(); 
            location.reload();
        }

        // --- HTML Templates ---
        const dashboardHTML = `
            <div class="stats-grid">
                <div class="stat-card"><h3>Total Users</h3><h1 id="total-users">0</h1></div>
                <div class="stat-card"><h3>Total Posts</h3><h1 id="total-posts">0</h1></div>
            </div>
            <p style="color: #666;">Welcome to GoChat Secure Admin Panel. Manage your platform from here.</p>
        `;

        const profileHTML = `
            <div class="admin-form-group" style="text-align: center; padding: 40px;">
                <img id="profile-admin-pic" src="https://ui-avatars.com/api/?name=Admin&background=4f46e5&color=fff&size=100" style="border-radius: 50%; margin-bottom: 20px; width: 100px; height: 100px; object-fit: cover;">
                <h2>Admin Profile</h2>
                <p style="font-size: 18px; color: #666; margin-top: 15px;">Logged in Email:</p>
                <h3 style="color: #4f46e5; margin-top: 5px;" id="admin-email-display">Loading...</h3>
                <p style="margin-top: 20px; font-size: 14px; color: #27ae60; font-weight: bold;">Status: Verified Master Admin 🔒</p>
            </div>
        `;

        const announceHTML = `
            <div class="admin-form-group">
                <h3>📢 Send Global Announcement</h3>
                <p style="font-size:14px; color:#666;">This message will be shown to all users inside the app.</p>
                <textarea id="announce-text" placeholder="Write your announcement here..."></textarea>
                <button class="btn" style="width: auto; padding: 10px 20px;" onclick="sendAnnouncement()">Send to All Users</button>
            </div>
            <div class="admin-form-group">
                <h3>📍 Currently Active Announcement</h3>
                <div id="current-announcement-box" style="padding:15px; background:#f9f9f9; border:1px solid #ddd; border-radius:5px; margin-top:10px;">
                    <p id="active-msg-text" style="font-size: 16px; font-weight: bold; color: #333;">No active announcement.</p>
                    <button id="delete-announce-btn" class="action-btn" style="margin-top:15px; display:none;" onclick="deleteAnnouncement()">Delete Announcement</button>
                </div>
            </div>
        `;

        const settingsHTML = `
            <div class="admin-form-group">
                <h3>🛠️ App Maintenance Mode</h3>
                <p style="font-size:14px; color:#666; margin-bottom:15px;">If you turn this ON, normal users will not be able to use the app.</p>
                <button id="maintenance-btn" class="toggle-btn toggle-off" onclick="toggleMaintenance()">Loading status...</button>
            </div>
        `;

        // --- Tab Switching Logic ---
        function switchTab(tab) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.target.classList.add('active');
            
            const title = document.getElementById('page-title');
            const contentArea = document.getElementById('content-area');

            if(tab === 'dashboard') {
                title.innerText = "Dashboard";
                contentArea.innerHTML = dashboardHTML;
                loadDashboardStats();
            } else if(tab === 'profile') {
                title.innerText = "My Profile";
                contentArea.innerHTML = profileHTML;
                const user = auth.currentUser;
                if(user) { 
                    document.getElementById('admin-email-display').innerText = user.email; 
                    if(user.photoURL) document.getElementById('profile-admin-pic').src = user.photoURL;
                }
            } else if(tab === 'users') {
                title.innerText = "Users Management";
                contentArea.innerHTML = '<p>Loading...</p>';
                loadUsersList();
            } else if(tab === 'posts') {
                title.innerText = "Posts Management";
                contentArea.innerHTML = '<p>Loading...</p>';
                loadPostsList();
            } else if(tab === 'announce') {
                title.innerText = "Global Announcements";
                contentArea.innerHTML = announceHTML;
                
                db.collection('system').doc('announcement').onSnapshot(doc => {
                    const msgBox = document.getElementById('active-msg-text');
                    const delBtn = document.getElementById('delete-announce-btn');
                    if(msgBox && delBtn) {
                        if(doc.exists && doc.data().message) {
                            msgBox.innerText = doc.data().message;
                            delBtn.style.display = 'inline-block';
                        } else {
                            msgBox.innerText = "No active announcement.";
                            delBtn.style.display = 'none';
                        }
                    }
                });
            } else if(tab === 'settings') {
                title.innerText = "App Settings";
                contentArea.innerHTML = settingsHTML;
                checkMaintenanceStatus();
            }
        }

        // --- Core Functions ---
        function loadDashboardStats() {
            db.collection('users').onSnapshot(snap => { if(document.getElementById('total-users')) document.getElementById('total-users').innerText = snap.size; });
            db.collection('posts').onSnapshot(snap => { if(document.getElementById('total-posts')) document.getElementById('total-posts').innerText = snap.size; });
        }

        async function loadUsersList() {
            const contentArea = document.getElementById('content-area');
            try {
                const snapshot = await db.collection('users').get();
                let html = '<table class="data-table"><tr><th>Avatar</th><th>Name</th><th>Email</th><th>Action</th></tr>';
                snapshot.forEach(doc => {
                    const user = doc.data();
                    const profilePic = user.avatar || user.profilePic || 'https://via.placeholder.com/40';
                    html += `<tr>
                        <td><img src="${profilePic}"></td>
                        <td><strong>${user.name || 'No Name'}</strong></td>
                        <td>${user.email || 'No Email'}</td>
                        <td><button class="action-btn" onclick="banUser('${doc.id}', '${user.email}')">Ban User</button></td>
                    </tr>`;
                });
                html += '</table>';
                contentArea.innerHTML = html;
            } catch(e) { contentArea.innerHTML = '<p style="color:red;">Error loading users.</p>'; }
        }

        async function loadPostsList() {
            const contentArea = document.getElementById('content-area');
            try {
                const snapshot = await db.collection('posts').get();
                let html = '<table class="data-table"><tr><th>Author</th><th>Post Text</th><th>Action</th></tr>';
                snapshot.forEach(doc => {
                    const post = doc.data();
                    const name = post.authorName || post.userName || post.name || 'Unknown';
                    const postText = post.text || post.title ? (post.text || post.title).substring(0, 50) + '...' : '[Image/Video Post]';
                    html += `<tr>
                        <td><strong>${name}</strong></td>
                        <td>${postText}</td>
                        <td><button class="action-btn" onclick="deletePost('${doc.id}')">Delete</button></td>
                    </tr>`;
                });
                html += '</table>';
                contentArea.innerHTML = html;
            } catch(e) { contentArea.innerHTML = '<p style="color:red;">Error loading posts.</p>'; }
        }

      async function banUser(uid, email) {
            if(confirm("Are you sure you want to PERMANENTLY BAN this user? All their posts and stories will be deleted.")) {
                try {
                    // .   
                    if(email) {
                        await db.collection('banned_emails').doc(email).set({ banned: true });
                    }
                    
                    // .   
                    await db.collection('users').doc(uid).update({ isBanned: true });
                    
                    // .   (     )
                    const postsSnap = await db.collection('posts').where('uid', '==', uid).get();
                    const batch = db.batch();
                    postsSnap.forEach(doc => batch.delete(doc.ref));
                    
                    const storiesSnap = await db.collection('stories').where('uid', '==', uid).get();
                    storiesSnap.forEach(doc => batch.delete(doc.ref));
                    
                    await batch.commit();
                    
                    alert("User has been successfully banned and all their data purged!");
                    loadUsersList(); 
                } catch(e) {
                    alert("Error banning user.");
                }
            }
        }

        async function deletePost(postId) {
            if(confirm("Are you sure you want to delete this post?")) {
                await db.collection('posts').doc(postId).delete();
                alert("Post deleted successfully!");
                loadPostsList(); 
            }
        }

        async function sendAnnouncement() {
            const text = document.getElementById('announce-text').value.trim();
            if(!text) return alert("Write something first!");
            try {
                await db.collection('system').doc('announcement').set({
                    message: text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Announcement updated globally!");
                document.getElementById('announce-text').value = '';
            } catch(e) { alert("Error sending announcement."); }
        }

        async function deleteAnnouncement() {
            if(confirm("Are you sure you want to remove this announcement? Users will no longer see it.")) {
                try {
                    await db.collection('system').doc('announcement').delete();
                    alert("Announcement deleted successfully!");
                } catch(e) {
                    alert("Error deleting announcement.");
                }
            }
        }
        
        let isMaintenanceOn = false;
        function checkMaintenanceStatus() {
            db.collection('system').doc('settings').onSnapshot(doc => {
                const btn = document.getElementById('maintenance-btn');
                if(!btn) return;
                if(doc.exists && doc.data().maintenanceMode === true) {
                    isMaintenanceOn = true;
                    btn.className = "toggle-btn toggle-on";
                    btn.innerText = "App is currently OFF (Turn ON to Resume)";
                } else {
                    isMaintenanceOn = false;
                    btn.className = "toggle-btn toggle-off";
                    btn.innerText = "App is currently ON (Turn OFF for Maintenance)";
                }
            });
        }

        async function toggleMaintenance() {
            const newState = !isMaintenanceOn;
            const confirmMsg = newState ? "Are you sure you want to lock the app for all users?" : "Are you sure you want to reopen the app?";
            if(confirm(confirmMsg)) {
                await db.collection('system').doc('settings').set({ maintenanceMode: newState }, { merge: true });
            }
        }
    </script>
</body>
</html>
