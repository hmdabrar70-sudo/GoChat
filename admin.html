<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoChat - Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; color: #333; }
        
        #admin-login-screen { display: flex; height: 100vh; justify-content: center; align-items: center; background: #2c3e50; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        .login-box h2 { margin-bottom: 20px; color: #4f46e5; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        .btn { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn:hover { background: #4338ca; }
        
        #admin-dashboard { display: none; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: #2c3e50; color: white; padding: 20px 0; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; letter-spacing: 1px; }
        .nav-link { padding: 15px 20px; color: #bdc3c7; text-decoration: none; display: block; border-left: 4px solid transparent; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: #34495e; color: white; border-left-color: #4f46e5; }
        
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .stats-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; flex: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; border-bottom: 4px solid #4f46e5; }
        .stat-card h3 { color: #7f8c8d; font-size: 16px; margin-bottom: 10px; }
        .stat-card h1 { color: #2c3e50; font-size: 32px; }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .data-table th, .data-table td { border-bottom: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; }
        .data-table th { background: #4f46e5; color: white; }
        .data-table img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .action-btn { padding: 6px 12px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .action-btn:hover { background: #c0392b; }

        /* Announcement & Settings Styles */
        .admin-form-group { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .admin-form-group textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-top: 10px; outline: none; }
        .toggle-btn { padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        .toggle-on { background: #27ae60; }
        .toggle-off { background: #e74c3c; }

        @media (max-width: 768px) {
            #admin-dashboard { flex-direction: column; }
            .sidebar { width: 100%; padding: 10px; display: flex; flex-direction: row; flex-wrap: wrap; justify-content: space-around; }
            .sidebar h2 { display: none; }
            .nav-link { padding: 10px; font-size: 14px; border-left: none; border-bottom: 3px solid transparent; }
            .nav-link:hover, .nav-link.active { border-left: none; border-bottom-color: #4f46e5; }
            .main-content { padding: 15px; }
            .stats-grid { flex-direction: column; }
            .data-table { display: block; overflow-x: auto; white-space: nowrap; }
        }
    </style>
</head>
<body>

    <div id="admin-login-screen">
        <div class="login-box">
            <h2>GoChat Admin</h2>
            <div id="login-error" style="color: red; margin-bottom: 10px; font-size: 14px;"></div>
            <input type="email" id="admin-email" class="input-field" placeholder="Admin Email">
            <input type="password" id="admin-pass" class="input-field" placeholder="Password">
            <button class="btn" onclick="loginAdmin()">Secure Login</button>
        </div>
    </div>

    <div id="admin-dashboard">
        <div class="sidebar">
            <h2>Admin Panel</h2>
            <div class="nav-link active" onclick="switchTab('dashboard')">📊 Dashboard</div>
            <div class="nav-link" onclick="switchTab('users')">👥 Users List</div>
            <div class="nav-link" onclick="switchTab('posts')">📝 Manage Posts</div>
            <div class="nav-link" onclick="switchTab('announce')">📢 Announcements</div>
            <div class="nav-link" onclick="switchTab('settings')">🛠️ Settings</div>
            <div style="flex:1;"></div>
            <div class="nav-link" style="color: #e74c3c;" onclick="logoutAdmin()">🚪 Logout</div>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1 id="page-title">Dashboard</h1>
                <div>Welcome, <strong style="color: #4f46e5;">Master Admin</strong></div>
            </div>
            <div id="content-area"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyAnKueAHG8cw6O-Hy8U9fgGzH4fDMYQBy8",
            authDomain: "gochat-3efa3.firebaseapp.com",
            projectId: "gochat-3efa3",
            storageBucket: "gochat-3efa3.firebasestorage.app",
            messagingSenderId: "203332487017",
            appId: "1:203332487017:web:06af0b8b4b12af89581ff8"
        });

        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // 🔒 ADMIN LOCK: শুধুমাত্র এই ইমেইলটি লগইন করতে পারবে
        const AUTHORIZED_ADMIN = "hbmabrar@gmail.com";

        auth.onAuthStateChanged(user => {
            if (user) {
                // ডাবল চেক: ইউজার কি আসলেই অ্যাডমিন?
                if(user.email !== AUTHORIZED_ADMIN) {
                    auth.signOut();
                    alert("SECURITY ALERT: You are not authorized to access the Admin Panel.");
                    return;
                }
                document.getElementById('admin-login-screen').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'flex';
                switchTab('dashboard');
            } else {
                document.getElementById('admin-login-screen').style.display = 'flex';
                document.getElementById('admin-dashboard').style.display = 'none';
            }
        });

        async function loginAdmin() {
            const email = document.getElementById('admin-email').value.trim();
            const pass = document.getElementById('admin-pass').value;
            const err = document.getElementById('login-error');
            
            if(!email || !pass) { err.innerText = "Please fill all fields!"; return; }
            
            // লগইনের আগেই চেক করা
            if(email !== AUTHORIZED_ADMIN) {
                err.innerText = "Access Denied: Unrecognized Admin ID!";
                return;
            }

            try { 
                await auth.signInWithEmailAndPassword(email, pass); 
            } 
            catch(e) { err.innerText = "Access Denied: Wrong Password"; }
        }

        async function logoutAdmin() { await auth.signOut(); }

        const dashboardHTML = `
            <div class="stats-grid">
                <div class="stat-card"><h3>Total Users</h3><h1 id="total-users">0</h1></div>
                <div class="stat-card"><h3>Total Posts</h3><h1 id="total-posts">0</h1></div>
            </div>
            <p>Welcome to GoChat Secure Admin Panel.</p>
        `;

        const announceHTML = `
            <div class="admin-form-group">
                <h3>📢 Send Global Announcement</h3>
                <p style="font-size:14px; color:#666;">This message will be shown to all users inside the app.</p>
                <textarea id="announce-text" placeholder="Write your announcement here..."></textarea>
                <button class="btn" style="width: auto; padding: 10px 20px;" onclick="sendAnnouncement()">Send to All Users</button>
            </div>
        `;

        const settingsHTML = `
            <div class="admin-form-group">
                <h3>🛠️ App Maintenance Mode</h3>
                <p style="font-size:14px; color:#666; margin-bottom:15px;">If you turn this ON, normal users will not be able to use the app. They will see an "Updating" screen.</p>
                <button id="maintenance-btn" class="toggle-btn toggle-off" onclick="toggleMaintenance()">Loading status...</button>
            </div>
        `;

        function switchTab(tab) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.target.classList.add('active');
            
            const title = document.getElementById('page-title');
            const contentArea = document.getElementById('content-area');

            if(tab === 'dashboard') {
                title.innerText = "Dashboard";
                contentArea.innerHTML = dashboardHTML;
                loadDashboardStats();
            } else if(tab === 'users') {
                title.innerText = "Users Management";
                contentArea.innerHTML = '<p>Loading...</p>';
                loadUsersList();
            } else if(tab === 'posts') {
                title.innerText = "Posts Management";
                contentArea.innerHTML = '<p>Loading...</p>';
                loadPostsList();
            } else if(tab === 'announce') {
                title.innerText = "Global Announcements";
                contentArea.innerHTML = announceHTML;
            } else if(tab === 'settings') {
                title.innerText = "App Settings";
                contentArea.innerHTML = settingsHTML;
                checkMaintenanceStatus();
            }
        }

        function loadDashboardStats() {
            db.collection('users').onSnapshot(snap => { if(document.getElementById('total-users')) document.getElementById('total-users').innerText = snap.size; });
            db.collection('posts').onSnapshot(snap => { if(document.getElementById('total-posts')) document.getElementById('total-posts').innerText = snap.size; });
        }

        async function loadUsersList() {
            const contentArea = document.getElementById('content-area');
            try {
                const snapshot = await db.collection('users').get();
                let html = '<table class="data-table"><tr><th>Avatar</th><th>Name</th><th>Email</th><th>Action</th></tr>';
                snapshot.forEach(doc => {
                    const user = doc.data();
                    html += `<tr>
                        <td><img src="${user.profilePic || 'https://via.placeholder.com/40'}"></td>
                        <td><strong>${user.name || 'No Name'}</strong></td>
                        <td>${user.email || 'No Email'}</td>
                        <td><button class="action-btn" onclick="deleteUser('${doc.id}')">Ban/Delete</button></td>
                    </tr>`;
                });
                html += '</table>';
                contentArea.innerHTML = html;
            } catch(e) { contentArea.innerHTML = '<p style="color:red;">Error loading users.</p>'; }
        }

                async function loadPostsList() {
            const contentArea = document.getElementById('content-area');
            try {
                // orderBy অংশটি বাদ দিয়ে সরাসরি সব পোস্ট কল করা হলো
                const snapshot = await db.collection('posts').get();
                let html = '<table class="data-table"><tr><th>Author</th><th>Post Text</th><th>Action</th></tr>';
                
                snapshot.forEach(doc => {
                    const post = doc.data();
                    // authorName না থাকলে userName দেখাবে
                    const name = post.authorName || post.userName || 'Unknown'; 
                    const postText = post.text ? post.text.substring(0, 50) + '...' : '[Image/Video Post]';
                    
                    html += `<tr>
                        <td><strong>${name}</strong></td>
                        <td>${postText}</td>
                        <td><button class="action-btn" onclick="deletePost('${doc.id}')">Delete</button></td>
                    </tr>`;
                });
                
                html += '</table>';
                contentArea.innerHTML = html;
            } catch(e) { 
                contentArea.innerHTML = '<p style="color:red;">Error loading posts.</p>'; 
            }
        }
        

        async function deletePost(postId) {
            if(confirm("Are you sure you want to delete this post?")) {
                await db.collection('posts').doc(postId).delete();
                alert("Post deleted!");
                loadPostsList(); 
            }
        }

        // --- NEW: Announcement Feature ---
        async function sendAnnouncement() {
            const text = document.getElementById('announce-text').value.trim();
            if(!text) return alert("Write something first!");
            
            try {
                await db.collection('system').doc('announcement').set({
                    message: text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Announcement updated globally!");
                document.getElementById('announce-text').value = '';
            } catch(e) { alert("Error sending announcement"); }
        }

        // --- NEW: Maintenance Mode Feature ---
        let isMaintenanceOn = false;
        
        function checkMaintenanceStatus() {
            db.collection('system').doc('settings').onSnapshot(doc => {
                const btn = document.getElementById('maintenance-btn');
                if(!btn) return;
                
                if(doc.exists && doc.data().maintenanceMode === true) {
                    isMaintenanceOn = true;
                    btn.className = "toggle-btn toggle-on";
                    btn.innerText = "App is currently OFF (Turn ON to Resume)";
                } else {
                    isMaintenanceOn = false;
                    btn.className = "toggle-btn toggle-off";
                    btn.innerText = "App is currently ON (Turn OFF for Maintenance)";
                }
            });
        }

        async function toggleMaintenance() {
            const newState = !isMaintenanceOn;
            const confirmMsg = newState ? "Are you sure you want to lock the app for all users?" : "Are you sure you want to reopen the app?";
            if(confirm(confirmMsg)) {
                await db.collection('system').doc('settings').set({ maintenanceMode: newState }, { merge: true });
            }
        }
    </script>
</body>
</html>
