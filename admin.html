<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoChat - Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; color: #333; }
        
        /* Admin Login Screen */
        #admin-login-screen {
            display: flex; height: 100vh; justify-content: center; align-items: center; background: #2c3e50;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 350px; text-align: center;
        }
        .login-box h2 { margin-bottom: 20px; color: #4f46e5; }
        .input-field {
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; outline: none;
        }
        .btn {
            width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        .btn:hover { background: #4338ca; }
        
        /* Admin Dashboard (Hidden by default) */
        #admin-dashboard { display: none; display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 250px; background: #2c3e50; color: white; padding: 20px 0; display: flex; flex-direction: column;
        }
        .sidebar h2 { text-align: center; margin-bottom: 30px; letter-spacing: 1px; }
        .nav-link {
            padding: 15px 20px; color: #bdc3c7; text-decoration: none; display: block; border-left: 4px solid transparent; cursor: pointer;
        }
        .nav-link:hover, .nav-link.active {
            background: #34495e; color: white; border-left-color: #4f46e5;
        }
        
        /* Main Content */
        .main-content {
            flex: 1; padding: 30px; overflow-y: auto;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Stats Cards */
        .stats-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: white; padding: 20px; border-radius: 10px; flex: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; border-bottom: 4px solid #4f46e5;
        }
        .stat-card h3 { color: #7f8c8d; font-size: 16px; margin-bottom: 10px; }
        .stat-card h1 { color: #2c3e50; font-size: 32px; }

    </style>
</head>
<body>

    <div id="admin-login-screen">
        <div class="login-box">
            <h2>GoChat Admin</h2>
            <div id="login-error" style="color: red; margin-bottom: 10px; font-size: 14px;"></div>
            <input type="email" id="admin-email" class="input-field" placeholder="Admin Email">
            <input type="password" id="admin-pass" class="input-field" placeholder="Password">
            <button class="btn" onclick="loginAdmin()">Login to Dashboard</button>
        </div>
    </div>

    <div id="admin-dashboard">
        
        <div class="sidebar">
            <h2>Admin Panel</h2>
            <div class="nav-link active" onclick="switchTab('dashboard')">📊 Dashboard</div>
            <div class="nav-link" onclick="switchTab('users')">👥 Users List</div>
            <div class="nav-link" onclick="switchTab('posts')">📝 Manage Posts</div>
            <div style="flex:1;"></div>
            <div class="nav-link" style="color: #e74c3c;" onclick="logoutAdmin()">🚪 Logout</div>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1 id="page-title">Dashboard</h1>
                <div>Welcome, <strong style="color: #4f46e5;">Admin</strong></div>
            </div>
            
            <div id="content-area">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <h1 id="total-users">0</h1>
                    </div>
                    <div class="stat-card">
                        <h3>Total Posts</h3>
                        <h1 id="total-posts">0</h1>
                    </div>
                </div>
                <p>Welcome to GoChat Admin Panel. Select an option from the menu to manage your app.</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        // আপনার অরিজিনাল ফায়ারবেস কনফিগ
        firebase.initializeApp({
            apiKey: "AIzaSyAnKueAHG8cw6O-Hy8U9fgGzH4fDMYQBy8",
            authDomain: "gochat-3efa3.firebaseapp.com",
            projectId: "gochat-3efa3",
            storageBucket: "gochat-3efa3.firebasestorage.app",
            messagingSenderId: "203332487017",
            appId: "1:203332487017:web:06af0b8b4b12af89581ff8"
        });

        const auth = firebase.auth();
        const db = firebase.firestore();

        // Admin Auth Listener
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('admin-login-screen').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'flex';
                loadDashboardStats();
            } else {
                document.getElementById('admin-login-screen').style.display = 'flex';
                document.getElementById('admin-dashboard').style.display = 'none';
            }
        });

        async function loginAdmin() {
            const email = document.getElementById('admin-email').value.trim();
            const pass = document.getElementById('admin-pass').value;
            const err = document.getElementById('login-error');
            
            if(!email || !pass) { err.innerText = "Please fill all fields!"; return; }
            
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch(e) {
                err.innerText = "Access Denied: " + e.message;
            }
        }

        async function logoutAdmin() {
            await auth.signOut();
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.target.classList.add('active');
            
            const title = document.getElementById('page-title');
            if(tab === 'dashboard') {
                title.innerText = "Dashboard";
            } else if(tab === 'users') {
                title.innerText = "Users Management";
            } else if(tab === 'posts') {
                title.innerText = "Posts Management";
            }
        }

        // রিয়েল-টাইমে মোট ইউজার ও পোস্ট কাউন্ট করা
        function loadDashboardStats() {
            db.collection('users').onSnapshot(snap => {
                document.getElementById('total-users').innerText = snap.size;
            });
            db.collection('posts').onSnapshot(snap => {
                document.getElementById('total-posts').innerText = snap.size;
            });
        }
    </script>
</body>
</html>
